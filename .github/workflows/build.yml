name: build launcher
on:
  workflow_dispatch:

env:
  APP_NAME: "Lilith Launcher"

permissions:
  contents: write

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v7

      - name: Setup Rust and Cargo
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: detect binary name
        id: bin
        run: |
          BIN_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name' | head -n1)
          echo "name=$BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "Detected binary name: $BIN_NAME"

      - name: verify source icon exists
        run: |
          test -f icon/icon.png || (echo "::error::icon/icon.png not found in repo" && exit 1)
          file icon/icon.png

      - name: build .icns with iconutil
        run: |
          mkdir icon.iconset
          sips -z 16 16     icon/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 icon/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o icon/icon.icns

      - name: point Cargo.toml icon at the .icns
        run: |
          python3 - <<'PY'
          import re
          with open("Cargo.toml") as f:
              content = f.read()
          content = re.sub(r"icon\s*=\s*\[.*?\]", 'icon = ["icon/icon.icns"]', content, flags=re.S)
          with open("Cargo.toml", "w") as f:
              f.write(content)
          PY
          grep -A1 "^\[package.metadata.bundle\]" Cargo.toml || true
          grep "icon" Cargo.toml

      - name: build both architectures
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin

      - name: bundle .app (structure, Info.plist, icon)
        run: cargo bundle --release --target x86_64-apple-darwin

      - name: merge into universal binary with lipo
        env:
          BIN_NAME: ${{ steps.bin.outputs.name }}
        run: |
          BUNDLE="target/x86_64-apple-darwin/release/bundle/osx/${APP_NAME}.app"
          lipo -create -output "universal_${BIN_NAME}" \
            "target/aarch64-apple-darwin/release/${BIN_NAME}" \
            "target/x86_64-apple-darwin/release/${BIN_NAME}"
          lipo -info "universal_${BIN_NAME}"
          cp "universal_${BIN_NAME}" "${BUNDLE}/Contents/MacOS/${BIN_NAME}"

      - name: ad-hoc code sign
        run: |
          BUNDLE="target/x86_64-apple-darwin/release/bundle/osx/${APP_NAME}.app"
          codesign --force --deep --sign - "${BUNDLE}"
          codesign --verify --verbose=2 "${BUNDLE}"

      - name: create dmg from final signed .app
        run: |
          BUNDLE="target/x86_64-apple-darwin/release/bundle/osx/${APP_NAME}.app"
          DMG_ROOT="dmg_root"
          mkdir -p "$DMG_ROOT"
          cp -R "$BUNDLE" "$DMG_ROOT/"
          ln -s /Applications "$DMG_ROOT/Applications"
          hdiutil create -volname "${APP_NAME}" -srcfolder "$DMG_ROOT" -ov -format UDZO "${APP_NAME}-macos-universal.dmg"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-universal
          path: ${{ env.APP_NAME }}-macos.dmg

  build_linux:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v7

      - name: Setup Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64

      - name: install system deps for Slint
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libgl1-mesa-dev \
            imagemagick

      - name: install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: detect binary name
        id: bin
        run: |
          BIN_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name' | head -n1)
          echo "name=$BIN_NAME" >> "$GITHUB_OUTPUT"
          echo "Detected binary name: $BIN_NAME"

      - name: generate icon set
        run: |
          convert icon/icon.png -resize 16x16     icon/icon-16.png
          convert icon/icon.png -resize 32x32     icon/icon-32.png
          convert icon/icon.png -resize 64x64     icon/icon-64.png
          convert icon/icon.png -resize 128x128   icon/icon-128.png
          convert icon/icon.png -resize 256x256   icon/icon-256.png
          convert icon/icon.png -resize 512x512   icon/icon-512.png
          convert icon/icon.png -resize 1024x1024 icon/icon-1024.png

      - name: build + bundle (.deb)
        run: cargo bundle --release

      - name: also package raw binary tarball
        env:
          BIN_NAME: ${{ steps.bin.outputs.name }}
        run: |
          mkdir -p dist/"${APP_NAME}"
          cp target/release/"${BIN_NAME}" dist/"${APP_NAME}"/
          cp -r icon dist/"${APP_NAME}"/icon
          tar -czf "${APP_NAME}-linux-x86_64.tar.gz" -C dist "${APP_NAME}"

      - name: upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-deb
          path: target/release/bundle/deb/*.deb

      - name: upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x86_64
          path: ${{ env.APP_NAME }}-linux-x86_64.tar.gz

  build_windows:
    runs-on: windows-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v7

      - name: Setup Rust and Cargo
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: build
        run: cargo build --release

      - name: detect binary name
        id: bin
        run: |
          $BIN_NAME = (cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name' | Select-Object -First 1)
          echo "name=$BIN_NAME" >> $env:GITHUB_OUTPUT
          echo "Detected binary name: $BIN_NAME"

      - name: convert icon png to ico
        run: magick convert icon/icon.png -define icon:auto-resize=256,128,64,48,32,16 icon.ico

      - name: download rcedit
        run: curl -L -o rcedit.exe https://github.com/electron/rcedit/releases/latest/download/rcedit-x64.exe

      - name: embed icon into exe
        run: ./rcedit.exe "target/release/${{ steps.bin.outputs.name }}.exe" --set-icon icon.ico

      - name: package
        run: |
          mkdir dist
          copy target\release\${{ steps.bin.outputs.name }}.exe "dist\Lilith Launcher.exe"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lilith-launcher-windows
          path: dist/Lilith Launcher.exe

  release:
    needs: [build_macos, build_linux, build_windows]
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v7

      - name: read version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"(.*)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: flatten artifact files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -la release-files

      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          prerelease: true
          files: release-files/*
          generate_release_notes: true
